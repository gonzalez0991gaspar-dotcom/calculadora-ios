name: Compilar App iOS

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest  # Solicita una Mac virtual de Apple en la nube

    steps:
    - name: Clonar el repositorio de Kali
      uses: actions/checkout@v3

    - name: Configurar Python en la Mac
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar herramientas de empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Generar andamio oficial de iOS
      run: briefcase create ios

    - name: Compilar archivo binario Xcode
      run: briefcase build ios --no-sign  # Compila sin requerir certificados de pago

    - name: Empaquetar y subir resultado final
      uses: actions/upload-artifact@v4
      with:
        name: Proyecto-iOS-Xcode
        path: build/calculadora/ios/xcode/
