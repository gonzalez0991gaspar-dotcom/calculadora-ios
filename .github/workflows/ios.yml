name: Compilar App iOS

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Clonar el repositorio de Kali
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar herramientas de empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Generar y Compilar App con Briefcase
      run: |
        briefcase create ios
        briefcase build ios

    - name: Subir archivo .app para tu iPhone
      uses: actions/upload-artifact@v4
      with:
        name: App-Calculadora-iOS-Real
        path: build/calculadora/ios/xcode/**/*.app
        include-hidden-files: true
