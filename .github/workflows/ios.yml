name: Compilar App iOS

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Clonar el repositorio de Kali
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar herramientas de empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Generar proyecto oficial de Xcode
      run: briefcase create ios  # Este comando genera la estructura nativa .xcodeproj sin pedir firmas

    - name: Subir Proyecto Xcode para AltStore
      uses: actions/upload-artifact@v4
      with:
        name: Proyecto-Calculadora-Xcode
        path: build/calculadora/ios/xcode/
