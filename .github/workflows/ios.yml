name: Compilar App iOS

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Clonar el repositorio de Kali
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar herramientas de empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Generar proyecto oficial de Xcode
      run: briefcase create ios

    - name: Compilar binario ejecutable (.app) con Xcode
      run: |
        cd build/calculadora/ios/xcode
        xcodebuild -project "Calculadora de Ritmo.xcodeproj" -scheme "Calculadora de Ritmo" -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build

    - name: Extraer y preparar el archivo .app
      run: |
        mkdir -p build_output
        cp -R ~/Library/Developer/Xcode/DerivedData/Calculadora_de_Ritmo-*/Build/Products/Debug-iphoneos/*.app ./build_output/

    - name: Subir archivo .app para tu iPhone
      uses: actions/upload-artifact@v4
      with:
        name: App-Calculadora-iOS-Real
        path: build_output/
